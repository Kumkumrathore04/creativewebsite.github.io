<!DOCTYPE html>
<html>
<head>
  <title>Kumkum's Space</title>
  <style>
    body {
      margin: 0;
      background: #eae7e1; /* soft aesthetic background */
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .section {
      width: 100%;
      max-width: 900px;
      margin: 40px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border-radius: 12px;
      overflow: hidden;
      background: white;
    }

    img {
      width: 100%;
      display: block;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="section">
      <img src="./Home.png">
    </div>

    <div class="section">
      <img src="book.png">
    </div>

    <div class="section">
      <img src="outfit.png">
    </div>

    <div class="section">
      <img src="dates.png">
    </div>

    <div class="section">
      <img src="artistic.png">
    </div>

    <div class="section">
      <img src="end.png">
    </div>

  </div>

</body>
</html>
